<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Option 3: Gaming Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050704;color:#e6e7e3;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:40px;overflow:hidden}
h1{font-size:18px;color:#78d08f;font-weight:900;letter-spacing:-.02em}.tag{font-size:11px;color:#4c4f4a;text-transform:uppercase;letter-spacing:.15em}
@keyframes rgbGlow{0%,100%{box-shadow:0 0 30px rgba(250,68,84,.3),0 0 60px rgba(120,208,143,.2),0 0 90px rgba(104,198,189,.15)}33%{box-shadow:0 0 30px rgba(120,208,143,.3),0 0 60px rgba(104,198,189,.2),0 0 90px rgba(250,68,84,.15)}66%{box-shadow:0 0 30px rgba(104,198,189,.3),0 0 60px rgba(250,68,84,.2),0 0 90px rgba(120,208,143,.15)}}
</style></head><body>
<h1>OPTION 4 — Gaming Monitor Mockup</h1><p class="tag">App inside gaming display · RGB glow · Premium gamer look</p>
<div style="display:flex;align-items:center;justify-content:center;gap:40px">
  <!-- Monitor frame -->
  <div style="position:relative">
    <!-- RGB glow behind monitor -->
    <div style="position:absolute;inset:-30px;border-radius:24px;animation:rgbGlow 4s ease-in-out infinite"></div>
    <!-- Monitor bezel -->
    <div style="position:relative;background:#0a0c0a;border-radius:18px;padding:14px 14px 40px;border:1px solid rgba(255,255,255,.08);box-shadow:0 40px 80px rgba(0,0,0,.4)">
      <!-- Screen content = DTHBoost app -->
      <div style="width:580px;background:#0a0d09;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.04)">
        <div style="background:#0a0c0a;padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.04)">
          <span style="width:8px;height:8px;border-radius:50%;background:rgba(228,103,103,.5)"></span><span style="width:8px;height:8px;border-radius:50%;background:rgba(240,179,75,.5)"></span><span style="width:8px;height:8px;border-radius:50%;background:rgba(120,208,143,.5)"></span>
          <span style="font-size:9px;color:#4c4f4a;margin-left:6px;font-family:'JetBrains Mono',monospace">DTHBoost v0.9.0</span><span style="margin-left:auto;font-size:8px;color:#78d08f;font-weight:700">OPTIMIZED</span>
        </div>
        <div style="display:flex;min-height:240px">
          <div style="width:130px;background:#080a08;padding:10px 8px;border-right:1px solid rgba(255,255,255,.03);display:flex;flex-direction:column;gap:7px">
            <div style="display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="56" fill="#78d08f"/><circle cx="60" cy="60" r="48" fill="#080a08"/><polygon points="66,26 42,66 52,66 46,94 78,54 68,54 76,26" fill="white"/></svg><span style="font-size:8px;font-weight:800">DTH<span style="color:#78d08f">Boost</span></span></div>
            <div style="height:3px;width:60%;background:rgba(120,208,143,.2);border-radius:2px"></div><div style="height:3px;width:80%;background:rgba(255,255,255,.04);border-radius:2px"></div><div style="height:3px;width:50%;background:rgba(255,255,255,.04);border-radius:2px"></div>
            <div style="margin-top:auto;padding:4px 6px;background:rgba(120,208,143,.04);border:1px solid rgba(120,208,143,.1);border-radius:4px;display:flex;align-items:center;gap:3px"><span style="width:4px;height:4px;border-radius:50%;background:#78d08f"></span><span style="font-size:7px;color:#78d08f;font-weight:700">SAFE</span></div>
          </div>
          <div style="flex:1;padding:10px;display:flex;flex-direction:column;gap:7px">
            <div style="display:flex;align-items:center;gap:4px;padding:4px 7px;background:rgba(120,208,143,.04);border:1px solid rgba(120,208,143,.1);border-radius:5px"><span style="width:4px;height:4px;border-radius:50%;background:#78d08f"></span><span style="font-size:7px;color:#78d08f;font-weight:700">BOOSTED</span></div>
            <div style="display:flex;gap:3px"><span style="padding:2px 6px;background:rgba(250,68,84,.12);color:#fa4454;font-size:7px;font-weight:700;border-radius:3px">VAL</span><span style="padding:2px 6px;background:rgba(255,255,255,.03);color:#767973;font-size:7px;border-radius:3px">CS2</span><span style="padding:2px 6px;background:rgba(255,255,255,.03);color:#767973;font-size:7px;border-radius:3px">FN</span></div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:5px;flex:1">
              <div style="background:#080a08;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:6px;color:#4c4f4a">Ready</span><span style="font-size:24px;font-family:'JetBrains Mono',monospace;font-weight:900;color:#78d08f;line-height:1">78</span></div>
              <div style="background:#080a08;border-radius:8px;padding:7px;display:flex;flex-direction:column;gap:3px">
                <div style="display:flex;justify-content:space-between"><span style="font-size:7px;color:#4c4f4a">FPS</span><span style="font-size:7px;font-family:'JetBrains Mono',monospace;color:#78d08f;font-weight:700">251</span></div>
                <div style="display:flex;justify-content:space-between"><span style="font-size:7px;color:#4c4f4a">Smooth</span><span style="font-size:7px;font-family:'JetBrains Mono',monospace;color:#78d08f;font-weight:700">194</span></div>
                <div style="height:18px;background:#0a0d09;border-radius:3px;display:flex;align-items:flex-end;gap:1px;padding:1px"><div style="flex:1;background:rgba(120,208,143,.2);border-radius:1px;height:50%"></div><div style="flex:1;background:rgba(120,208,143,.3);border-radius:1px;height:70%"></div><div style="flex:1;background:rgba(120,208,143,.15);border-radius:1px;height:40%"></div><div style="flex:1;background:rgba(120,208,143,.25);border-radius:1px;height:85%"></div><div style="flex:1;background:rgba(120,208,143,.18);border-radius:1px;height:60%"></div></div>
              </div>
            </div>
            <div style="display:flex;gap:4px"><div style="flex:1;padding:4px;background:#78d08f;color:#050704;text-align:center;font-size:7px;font-weight:700;border-radius:4px">Scan</div><div style="flex:1;padding:4px;background:#0a0d09;border:1px solid rgba(255,255,255,.04);text-align:center;font-size:7px;color:#767973;border-radius:4px">Test</div></div>
          </div>
        </div>
      </div>
      <!-- Monitor stand -->
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:120px;height:6px;background:#0f130f;border-radius:3px"></div>
      <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:8px;background:#0a0c0a;border-radius:0 0 6px 6px"></div>
    </div>
  </div>
  <!-- Keyboard hint -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.4">
    <div style="display:flex;gap:4px"><div style="width:20px;height:20px;border-radius:3px;background:rgba(120,208,143,.1)"></div><div style="width:20px;height:20px;border-radius:3px;background:rgba(120,208,143,.05)"></div><div style="width:20px;height:20px;border-radius:3px;background:rgba(120,208,143,.05)"></div></div>
    <div style="display:flex;gap:4px"><div style="width:120px;height:12px;border-radius:3px;background:rgba(255,255,255,.03)"></div></div>
    <div style="display:flex;gap:4px"><div style="width:90px;height:12px;border-radius:3px;background:rgba(255,255,255,.03)"></div></div>
  </div>
</div>
<p style="text-align:center;font-size:12px;color:#4c4f4a;margin-top:24px">App framed like a gaming monitor · RGB glow behind the display · Keyboard accent</p>
</body></html>
